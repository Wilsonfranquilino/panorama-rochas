services:

  ingestor:
    build:
      context: .
      dockerfile: ingestor/Dockerfile
    container_name: panorama_ingestor
    volumes:
      - ./data:/data
    env_file: .env
    environment:
      - BRONZE_PATH=/data/bronze
    command: python ingestor/main.py
    networks:
      - panorama

  transformer:
    build:
      context: .
      dockerfile: transformer/Dockerfile
    container_name: panorama_transformer
    volumes:
      - ./data:/data
    environment:
      - BRONZE_PATH=/data/bronze
      - SILVER_PATH=/data/silver
      - GOLD_PATH=/data/gold
    depends_on:
      ingestor:
        condition: service_completed_successfully
    command: python transformer/main.py
    networks:
      - panorama

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: panorama_app
    volumes:
      - ./data:/data
    env_file: .env
    environment:
      - GOLD_PATH=/data/gold
    ports:
      - "8501:8501"
    depends_on:
      transformer:
        condition: service_completed_successfully
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    networks:
      - panorama

networks:
  panorama:
    driver: bridge